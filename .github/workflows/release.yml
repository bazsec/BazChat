name: Package and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # CurseForge upload is handled by CF's webhook auto-packager
      # (configured at the repo level). The -d flag below skips the
      # CF upload so we don't double-publish; the GitHub Release is
      # still created as a backup artifact.
      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          args: -g retail -d
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
